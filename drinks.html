<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Drinks | Cafe Management</title>
<link rel="stylesheet" href="style.css">
<script src="script.js"></script>
</head>
<body onload="updateCartCount()">

<header>Cafe Management System</header>

<nav>
  <a href="index.html">Home</a>
  <a href="food.html">Food</a>
  <a href="drinks.html">Drinks</a>
  <a href="dessert.html">Desserts</a>
  <a href="cart.html" style="position:relative;">
    🛒 Cart 
    <span id="cart-count" style="
      background:red;
      color:white;
      border-radius:50%;
      padding:2px 6px;
      font-size:12px;
      position:absolute;
      top:-5px;
      right:-10px;">0</span>
  </a>
</nav>

<section class="menu-section">
<h2 class="menu-title">☕ Drinks Menu</h2>

<!-- Search Bar -->
<div style="text-align:center; margin-bottom:20px;">
  <input type="text" id="drink-search" placeholder="Search drinks..." onkeyup="filterDrinks()" style="padding:8px; width:50%; border-radius:8px; border:1px solid #ccc;">
</div>

<div id="drink-items" class="menu-grid"></div>

<div style="text-align:center; margin-top:20px;">
  <button onclick="goToCheckout()">Proceed to Checkout</button>
</div>

</section>

<footer>© 2026 Cafe Management System</footer>

<script>
// Drinks list
const drinksMenu = [
  {name:"Americano", price:120, img: "americano.jpg"},
  {name:"Cafe Latte", price:130, img:"cafe-latte.jpg"},
  {name:"Cappuccino", price:140, img:"cappuccino.jpg"},
  {name:"Chocolate Milkshake", price:150, img:"chocolate-milkshake.jpg"},
  {name:"Cold Brew Coffee", price:160, img:"cold-brew-coffee.jpg"},
  {name:"Espresso", price:110, img:"espresso.jpg"},
  {name:"Flat White", price:130, img:"flat-white.jpg"},
  {name:"Frappe Coffee", price:140, img:"frappe-coffee.jpg"},
  {name:"Green Tea", price:100, img:"green-tea.jpg"},
  {name:"Herbal Tea", price:90, img:"herbal-tea.jpg"},
  {name:"Iced Coffee", price:150, img:"iced-coffee.jpg"},
  {name:"Iced Latte", price:150, img:"iced-latte.jpg"},
  {name:"Iced Mocha", price:160, img:"iced-mocha.jpg"},
  {name:"Iced Tea", price:120, img:"iced-tea.jpg"},
  {name:"Lemon Tea", price:100, img:"lemon-tea.jpg"},
  {name:"Mango Smoothie", price:150, img:"mango-smoothie.jpg"},
  {name:"Masala Chai", price:90, img:"masala-chai.jpg"},
  {name:"Mocha", price:140, img:"mocha.jpg"},
  {name:"Oreo Shake", price:160, img:"oreo-shake.jpg"},
  {name:"Hot Chocolate", price:130, img:"hot-chocolate.jpg"}
];

// Display drinks
function displayDrinks(items){
  const div = document.getElementById("drink-items");
  div.innerHTML = "";
  items.forEach(item=>{
    const card = document.createElement("div");
    card.classList.add("menu-card");
    card.innerHTML = `
      <img src="${item.img}" alt="${item.name}">
      <h3>${item.name}</h3>
      <p>Price: ₹${item.price}</p>
      <label>Qty: <input type="number" id="qty-${item.name.replace(/\s/g,'-').toLowerCase()}" value="1" min="1" style="width:50px;"></label>
      <button onclick="addItemToCart('${item.name}',${item.price},'qty-${item.name.replace(/\s/g,'-').toLowerCase()}')">Add to Cart</button>
    `;
    div.appendChild(card);
  });
}

// Filter drinks
function filterDrinks(){
  const query = document.getElementById("drink-search").value.toLowerCase();
  const filtered = drinksMenu.filter(item=> item.name.toLowerCase().includes(query));
  displayDrinks(filtered);
}

// Initial display
displayDrinks(drinksMenu);

// Add to cart
function addItemToCart(name, price, qtyId){
  const qtyInput = document.getElementById(qtyId);
  let qty = parseInt(qtyInput.value);
  if(qty<1) qty=1;

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  const index = cart.findIndex(item => item.name===name);
  if(index!==-1) cart[index].qty += qty;
  else cart.push({name:name, price:price, qty:qty});
  
  localStorage.setItem("cart", JSON.stringify(cart));
  updateCartCount();
  alert(`${name} x${qty} added to cart ✅`);
}

// Update cart badge
function updateCartCount(){
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  const total = cart.reduce((sum,item)=>sum+item.qty,0);
  document.getElementById("cart-count").innerText = total;
}

// Proceed to checkout
function goToCheckout(){
  const cart = JSON.parse(localStorage.getItem("cart")) || [];
  if(cart.length===0){ alert("Cart is empty! Add items first."); return;}
  window.location.href="cart.html";
}
</script>

</body>
</html>
