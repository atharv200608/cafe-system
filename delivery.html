<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delivery | Cafe Management</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body>

<header>Cafe Management System</header>

<section class="menu-section">
  <h2>Enter Delivery Details</h2>

  <div class="menu-card">
    <label>Name:</label>
    <input type="text" id="name" class="input-box" placeholder="Your Name">

    <label>Phone:</label>
    <input type="text" id="phone" class="input-box" placeholder="Phone Number">

    <label>Address:</label>
    <textarea id="address" class="input-box" placeholder="Delivery Address"></textarea>

    <button onclick="saveDelivery()">Proceed to Payment</button>
  </div>
</section>

</body>
</html>
