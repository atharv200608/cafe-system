<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Track Order | Cafe Management</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>
<body onload="startTracking()">

<header>Cafe Management System</header>

<section class="menu-section">
  <h2>Track Your Order</h2>

  <div class="menu-card">
    <p id="status">Loading status...</p>
    <p>Estimated delivery time: 30–40 minutes</p>
    <p>Time left to cancel order: <span id="timer">02:00</span></p>
  </div>

  <div class="menu-card">
    <button onclick="goHome()">Go to Home</button>
  </div>
</section>

</body>
</html>
